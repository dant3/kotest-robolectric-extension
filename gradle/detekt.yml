build:
    maxIssues: 0
    excludeCorrectable: false
    weights:
    # complexity: 2
    # LongParameterList: 1
    # style: 1
    # comments: 1

config:
    validation: true
    warningsAsErrors: false
    checkExhaustiveness: false
    # when writing own rules with new properties, exclude the property path e.g.: 'my_rule_set,.*>.*>[my_property]'
    excludes: ''

processors:
    active: true
    exclude:
        - 'DetektProgressListener'
        - 'KtFileCountProcessor'
        - 'PackageCountProcessor'
        - 'ClassCountProcessor'
        - 'FunctionCountProcessor'
        - 'PropertyCountProcessor'
        - 'ProjectComplexityProcessor'
        - 'ProjectCognitiveComplexityProcessor'
        - 'ProjectLLOCProcessor'
        - 'ProjectCLOCProcessor'
        - 'ProjectLOCProcessor'
        - 'ProjectSLOCProcessor'
        - 'LicenseHeaderLoaderExtension'

console-reports:
    active: true
    exclude:
        - 'ProjectStatisticsReport'
        - 'ComplexityReport'
        - 'NotificationReport'
        - 'FindingsReport'
        - 'FileBasedFindingsReport'
    #  - 'LiteFindingsReport'

output-reports:
    active: true
    exclude:
    # - 'TxtOutputReport'
    # - 'XmlOutputReport'
    # - 'HtmlOutputReport'
    # - 'MdOutputReport'
    # - 'SarifOutputReport'

formatting:
    active: true
    AnnotationOnSeparateLine:
        active: true
        indentSize: 4
        ignoreAnnotated:
            - MapColumn
    AnnotationSpacing:
        active: true
        ignoreAnnotated:
            - MapColumn
    ArgumentListWrapping:
        active: true
        maxLineLength: 140
        indentSize: 4
    BlockCommentInitialStarAlignment:
        active: true
    ChainWrapping:
        active: true
    ClassName:
        active: true
    CommentSpacing:
        active: true
    CommentWrapping:
        active: true
    ContextReceiverMapping:
        active: true
        maxLineLength: 140
        indentSize: 4
    DiscouragedCommentLocation:
        active: true
    EnumWrapping:
        active: true
        indentSize: 4
    EnumEntryNameCase:
        active: false
    Filename:
        active: false
    FunKeywordSpacing:
        active: true
    FunctionReturnTypeSpacing:
        active: true
        maxLineLength: 140
    FunctionSignature:
        active: false
        forceMultilineWhenParameterCountGreaterOrEqualThan: 2
        indentSize: 4
        maxLineLength: 140
        functionBodyExpressionWrapping: default
    FunctionStartOfBodySpacing:
        active: true
    FunctionTypeReferenceSpacing:
        active: true
    FinalNewline:
        active: false
    IfElseBracing:
        active: true
        indentSize: 4
    IfElseWrapping:
        active: true
        indentSize: 4
    ImportOrdering:
        active: true
        layout: "*"
    Indentation:
        active: true
        indentSize: 4
    MaximumLineLength:
        # we use style.MaxLineLength instead
        active: false
    ModifierListSpacing:
        active: true
    ModifierOrdering:
        # we use style.ModifierOrder
        active: false
    MultiLineIfElse:
        active: true
        indentSize: 4
    MultilineExpressionWrapping:
        active: false
        indentSize: 4
    NoBlankLineBeforeRbrace:
        active: true
    NoBlankLineInList:
        active: true
    NoBlankLinesInChainedMethodCalls:
        active: true
    NoConsecutiveBlankLines:
        active: true
    NoConsecutiveComments:
        active: true
    NoEmptyClassBody:
        active: true
    NoEmptyFirstLineInClassBody:
        active: true
        indentSize: 4
    NoEmptyFirstLineInMethodBlock:
        active: true
    NoLineBreakAfterElse:
        active: true
    NoLineBreakBeforeAssignment:
        active: true
    NoMultipleSpaces:
        active: true
    NoSemicolons:
        active: true
    NoSingleLineBlockComment:
        active: true
        indentSize: 4
    NoTrailingSpaces:
        active: true
    NoUnitReturn:
        active: true
    NoUnusedImports:
        active: false # duplicates UnusedImports
    NoWildcardImports:
        active: true
    NullableTypeSpacing:
        active: true
    PackageName:
        active: true
    ParameterListSpacing:
        active: true
    ParameterListWrapping:
        active: true
        indentSize: 4
        maxLineLength: 140
    ParameterWrapping:
        active: true
        indentSize: 4
        maxLineLength: 140
    PropertyWrapping:
        active: true
        indentSize: 4
        maxLineLength: 140
    SpacingAroundAngleBrackets:
        active: true
    SpacingAroundColon:
        active: true
    SpacingAroundComma:
        active: true
    SpacingAroundCurly:
        active: true
    SpacingAroundDot:
        active: true
    SpacingAroundDoubleColon:
        active: true
    SpacingAroundKeyword:
        active: true
    SpacingAroundOperators:
        active: true
    SpacingAroundParens:
        active: true
    SpacingAroundRangeOperator:
        active: true
    SpacingAroundUnaryOperator:
        active: true
    SpacingBetweenDeclarationsWithAnnotations:
        active: true
    SpacingBetweenDeclarationsWithComments:
        active: true
    SpacingBetweenFunctionNameAndOpeningParenthesis:
        active: true
    StringTemplate:
        active: true
    StringTemplateIndent:
        active: false
        indentSize: 4
    TrailingCommaOnCallSite:
        active: true
        useTrailingCommaOnCallSite: true
    TrailingCommaOnDeclarationSite:
        active: true
        useTrailingCommaOnDeclarationSite: true
    TryCatchFinallySpacing:
        active: true
        indentSize: 4
    TypeArgumentListSpacing:
        active: false
        indentSize: 4
    TypeParameterListSpacing:
        active: true
        indentSize: 4
    UnnecessaryParenthesesBeforeTrailingLambda:
        active: true
    Wrapping:
        active: true
        indentSize: 4
        maxLineLength: 140

comments:
    active: true
    AbsentOrWrongFileLicense:
        active: false
        licenseTemplateFile: 'license.template'
        licenseTemplateIsRegex: false
    CommentOverPrivateFunction:
        active: false
    CommentOverPrivateProperty:
        active: false
    DeprecatedBlockTag:
        active: false
    EndOfSentenceFormat:
        active: false
        endOfSentenceFormat: '([.?!][ \t\n\r\f<])|([.?!:]$)'
    KDocReferencesNonPublicProperty:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    OutdatedDocumentation:
        active: false
        matchTypeParameters: true
        matchDeclarationsOrder: true
        allowParamOnConstructorProperties: false
    UndocumentedPublicClass:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        searchInNestedClass: true
        searchInInnerClass: true
        searchInInnerObject: true
        searchInInnerInterface: true
        searchInProtectedClass: false
    UndocumentedPublicFunction:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        searchProtectedFunction: false
    UndocumentedPublicProperty:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        searchProtectedProperty: false

complexity:
    active: true
    CognitiveComplexMethod:
        active: false
        threshold: 15
    ComplexCondition:
        active: true
        threshold: 4
    ComplexInterface:
        active: false
        threshold: 10
        includeStaticDeclarations: false
        includePrivateDeclarations: false
        ignoreOverloaded: false
    CyclomaticComplexMethod:
        active: true
        threshold: 16
        ignoreSingleWhenExpression: true
        ignoreSimpleWhenEntries: true
        ignoreNestingFunctions: true
        nestingFunctions:
            - 'also'
            - 'apply'
            - 'forEach'
            - 'isNotNull'
            - 'ifNull'
            - 'let'
            - 'run'
            - 'use'
            - 'with'
    LabeledExpression:
        active: false
        ignoredLabels: []
    LargeClass:
        active: true
        threshold: 600
    LongMethod:
        active: false
        threshold: 60
    LongParameterList:
        active: true
        functionThreshold: 10
        constructorThreshold: 11
        ignoreDefaultParameters: true
        ignoreDataClasses: true
        ignoreAnnotatedParameter: []
    MethodOverloading:
        active: false
        threshold: 6
    NamedArguments:
        active: false
        threshold: 3
        ignoreArgumentsMatchingNames: false
    NestedBlockDepth:
        active: true
        threshold: 4
    NestedScopeFunctions:
        active: false
        threshold: 1
        functions:
            - 'kotlin.apply'
            - 'kotlin.run'
            - 'kotlin.with'
            - 'kotlin.let'
            - 'kotlin.also'
    ReplaceSafeCallChainWithRun:
        active: false
    StringLiteralDuplication:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        threshold: 3
        ignoreAnnotation: true
        excludeStringsWithLessThan5Characters: true
        ignoreStringsRegex: '$^'
    TooManyFunctions:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        thresholdInFiles: 11
        thresholdInClasses: 11
        thresholdInInterfaces: 11
        thresholdInObjects: 11
        thresholdInEnums: 11
        ignoreDeprecated: false
        ignorePrivate: false
        ignoreOverridden: false
        ignoreAnnotatedFunctions:
            - Preview
coroutines:
    active: true
    GlobalCoroutineUsage:
        active: true
    InjectDispatcher:
        active: true
        dispatcherNames:
            - 'IO'
            - 'Default'
            - 'Unconfined'
    RedundantSuspendModifier:
        active: true
    SleepInsteadOfDelay:
        active: true
    SuspendFunSwallowedCancellation:
        active: false
    SuspendFunWithCoroutineScopeReceiver:
        active: false
    SuspendFunWithFlowReturnType:
        active: true

empty-blocks:
    active: true
    EmptyCatchBlock:
        active: true
        allowedExceptionNameRegex: '_|(ignore|expected).*'
    EmptyClassBlock:
        active: true
    EmptyDefaultConstructor:
        active: true
    EmptyDoWhileBlock:
        active: true
    EmptyElseBlock:
        active: true
    EmptyFinallyBlock:
        active: true
    EmptyForBlock:
        active: true
    EmptyFunctionBlock:
        active: true
        ignoreOverridden: true
    EmptyIfBlock:
        active: true
    EmptyInitBlock:
        active: true
    EmptyKtFile:
        active: true
    EmptySecondaryConstructor:
        active: true
    EmptyTryBlock:
        active: true
    EmptyWhenBlock:
        active: true
    EmptyWhileBlock:
        active: true

exceptions:
    active: true
    ExceptionRaisedInUnexpectedLocation:
        active: true
        methodNames:
            - 'equals'
            - 'finalize'
            - 'hashCode'
            - 'toString'
    InstanceOfCheckForException:
        active: true
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    NotImplementedDeclaration:
        active: false
    ObjectExtendsThrowable:
        active: false
    PrintStackTrace:
        active: true
    RethrowCaughtException:
        active: true
    ReturnFromFinally:
        active: true
        ignoreLabeled: false
    SwallowedException:
        active: true
        ignoredExceptionTypes:
            - 'InterruptedException'
            - 'MalformedURLException'
            - 'NumberFormatException'
            - 'ParseException'
            - 'CancellationException'
        allowedExceptionNameRegex: '_|(ignore|expected).*'
    ThrowingExceptionFromFinally:
        active: true
    ThrowingExceptionInMain:
        active: false
    ThrowingExceptionsWithoutMessageOrCause:
        active: true
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        exceptions:
            - 'ArrayIndexOutOfBoundsException'
            - 'Exception'
            - 'IllegalArgumentException'
            - 'IllegalMonitorStateException'
            - 'IllegalStateException'
            - 'IndexOutOfBoundsException'
            - 'NullPointerException'
            - 'RuntimeException'
            - 'Throwable'
    ThrowingNewInstanceOfSameException:
        active: true
    TooGenericExceptionCaught:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        exceptionNames:
            - 'ArrayIndexOutOfBoundsException'
            - 'Error'
            - 'Exception'
            - 'IllegalMonitorStateException'
            - 'IndexOutOfBoundsException'
            - 'NullPointerException'
            - 'RuntimeException'
        allowedExceptionNameRegex: '_|(ignore|expected).*'
    TooGenericExceptionThrown:
        active: true
        exceptionNames:
            - 'Error'
            - 'Exception'
            - 'RuntimeException'
            - 'Throwable'

naming:
    active: true
    BooleanPropertyNaming:
        active: false
        allowedPattern: '^(is|has|are)'
    ClassNaming:
        active: true
        classPattern: '[A-Z][a-zA-Z0-9]*'
    ConstructorParameterNaming:
        active: true
        parameterPattern: '[a-z][A-Za-z0-9]*'
        privateParameterPattern: '[a-z][A-Za-z0-9]*'
        excludeClassPattern: '$^'
    EnumNaming:
        active: false
        enumEntryPattern: '[A-Z][_a-zA-Z0-9]*'
    ForbiddenClassName:
        active: false
        forbiddenName: []
    FunctionMaxLength:
        active: false
        maximumFunctionNameLength: 30
    FunctionMinLength:
        active: false
        minimumFunctionNameLength: 3
    FunctionNaming:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        functionPattern: '[a-z][a-zA-Z0-9]*'
        excludeClassPattern: '$^'
        ignoreAnnotated:
            - Composable
    FunctionParameterNaming:
        active: false
        parameterPattern: '[a-z][A-Za-z0-9]*'
        excludeClassPattern: '$^'
    InvalidPackageDeclaration:
        active: true
        rootPackage: ''
        requireRootInDeclaration: false
    LambdaParameterNaming:
        active: false
        parameterPattern: '[a-z][A-Za-z0-9]*|_'
    MatchingDeclarationName:
        active: true
        mustBeFirst: true
    MemberNameEqualsClassName:
        active: true
        ignoreOverridden: true
    NoNameShadowing:
        active: true
    NonBooleanPropertyPrefixedWithIs:
        active: false
    ObjectPropertyNaming:
        active: true
        constantPattern: '[A-Za-z][_A-Za-z0-9]*'
        propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
        privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'
    PackageNaming:
        active: true
        packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
    TopLevelPropertyNaming:
        active: true
        constantPattern: '[A-Z][_A-Za-z0-9]*'
        propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
        privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'
    VariableMaxLength:
        active: false
        maximumVariableNameLength: 64
    VariableMinLength:
        active: false
        minimumVariableNameLength: 1
    VariableNaming:
        active: true
        variablePattern: '[a-z][A-Za-z0-9]*'
        privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'
        excludeClassPattern: '$^'

performance:
    active: true
    ArrayPrimitive:
        active: true
    CouldBeSequence:
        active: true
        threshold: 3
    ForEachOnRange:
        active: true
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    SpreadOperator:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    UnnecessaryPartOfBinaryExpression:
        active: false
    UnnecessaryTemporaryInstantiation:
        active: true

potential-bugs:
    active: true
    AvoidReferentialEquality:
        active: true
        forbiddenTypePatterns:
            - 'kotlin.String'
    CastNullableToNonNullableType:
        active: false
    CastToNullableType:
        active: false
    Deprecation:
        active: true
    DontDowncastCollectionTypes:
        active: false
    DoubleMutabilityForCollection:
        active: true
        mutableTypes:
            - 'kotlin.collections.MutableList'
            - 'kotlin.collections.MutableMap'
            - 'kotlin.collections.MutableSet'
            - 'java.util.ArrayList'
            - 'java.util.LinkedHashSet'
            - 'java.util.HashSet'
            - 'java.util.LinkedHashMap'
            - 'java.util.HashMap'
    ElseCaseInsteadOfExhaustiveWhen:
        active: true
        ignoredSubjectTypes: []
    EqualsAlwaysReturnsTrueOrFalse:
        active: true
    EqualsWithHashCodeExist:
        active: true
    ExitOutsideMain:
        active: false
    ExplicitGarbageCollectionCall:
        active: true
    HasPlatformType:
        active: true
    IgnoredReturnValue:
        active: true
        restrictToConfig: true
        returnValueAnnotations:
            - 'CheckResult'
            - '*.CheckResult'
            - 'CheckReturnValue'
            - '*.CheckReturnValue'
        ignoreReturnValueAnnotations:
            - 'CanIgnoreReturnValue'
            - '*.CanIgnoreReturnValue'
        returnValueTypes:
            - 'kotlin.sequences.Sequence'
            - 'kotlinx.coroutines.flow.*Flow'
            - 'java.util.stream.*Stream'
        ignoreFunctionCall: []
    ImplicitDefaultLocale:
        active: false
    ImplicitUnitReturnType:
        active: false
        allowExplicitReturnType: true
    InvalidRange:
        active: true
    IteratorHasNextCallsNextMethod:
        active: true
    IteratorNotThrowingNoSuchElementException:
        active: true
    LateinitUsage:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
        ignoreOnClassesPattern: ''
    MapGetWithNotNullAssertionOperator:
        active: true
    MissingPackageDeclaration:
        active: false
        excludes: ['**/*.kts']
    NullCheckOnMutableProperty:
        active: false
    NullableToStringCall:
        active: false
    PropertyUsedBeforeDeclaration:
        active: false
    UnconditionalJumpStatementInLoop:
        active: false
    UnnecessaryNotNullCheck:
        active: false
    UnnecessaryNotNullOperator:
        active: true
    UnnecessarySafeCall:
        active: true
    UnreachableCatchBlock:
        active: true
    UnreachableCode:
        active: true
    UnsafeCallOnNullableType:
        active: true
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    UnsafeCast:
        active: true
    UnusedUnaryOperator:
        active: true
    UselessPostfixExpression:
        active: true
    WrongEqualsTypeParameter:
        active: true

style:
    active: true
    AlsoCouldBeApply:
        active: false
    BracesOnIfStatements:
        active: false
        singleLine: 'never'
        multiLine: 'always'
    BracesOnWhenStatements:
        active: false
        singleLine: 'necessary'
        multiLine: 'consistent'
    CanBeNonNullable:
        active: true
    CascadingCallWrapping:
        active: false
        includeElvis: true
    ClassOrdering:
        active: false
    CollapsibleIfStatements:
        active: true
    DataClassContainsFunctions:
        active: false
        conversionFunctionPrefix:
            - 'to'
        allowOperators: false
    DataClassShouldBeImmutable:
        active: false
    DestructuringDeclarationWithTooManyEntries:
        active: true
        maxDestructuringEntries: 8
    DoubleNegativeLambda:
        active: false
        negativeFunctions:
            - reason: 'Use `takeIf` instead.'
              value: 'takeUnless'
            - reason: 'Use `all` instead.'
              value: 'none'
        negativeFunctionNameParts:
            - 'not'
            - 'non'
    EqualsNullCall:
        active: true
    EqualsOnSignatureLine:
        active: false
    ExplicitCollectionElementAccessMethod:
        active: false
    ExplicitItLambdaParameter:
        active: true
    ExpressionBodySyntax:
        active: false
        includeLineWrapping: false
    ForbiddenAnnotation:
        active: false
        annotations:
            - reason: 'it is a java annotation. Use `Suppress` instead.'
              value: 'java.lang.SuppressWarnings'
            - reason: 'it is a java annotation. Use `kotlin.Deprecated` instead.'
              value: 'java.lang.Deprecated'
            - reason: 'it is a java annotation. Use `kotlin.annotation.MustBeDocumented` instead.'
              value: 'java.lang.annotation.Documented'
            - reason: 'it is a java annotation. Use `kotlin.annotation.Target` instead.'
              value: 'java.lang.annotation.Target'
            - reason: 'it is a java annotation. Use `kotlin.annotation.Retention` instead.'
              value: 'java.lang.annotation.Retention'
            - reason: 'it is a java annotation. Use `kotlin.annotation.Repeatable` instead.'
              value: 'java.lang.annotation.Repeatable'
            - reason: 'Kotlin does not support @Inherited annotation, see https://youtrack.jetbrains.com/issue/KT-22265'
              value: 'java.lang.annotation.Inherited'
    ForbiddenComment:
        active: true
        comments:
            - reason: 'Forbidden STOPSHIP todo marker in comment, please address the problem before shipping the code.'
              value: 'STOPSHIP:'
        allowedPatterns: ''
    ForbiddenImport:
        active: true
        imports: []
        forbiddenPatterns: ''
    ForbiddenMethodCall:
        active: true
        methods:
            - reason: 'print does not allow you to configure the output stream. Use a logger instead.'
              value: 'kotlin.io.print'
            - reason: 'println does not allow you to configure the output stream. Use a logger instead.'
              value: 'kotlin.io.println'
    ForbiddenSuppress:
        active: false
        rules: []
    ForbiddenVoid:
        active: true
        ignoreOverridden: false
        ignoreUsageInGenerics: false
    FunctionOnlyReturningConstant:
        active: true
        ignoreOverridableFunction: true
        ignoreActualFunction: true
        excludedFunctions: []
    LoopWithTooManyJumpStatements:
        active: true
        maxJumpCount: 1
    MagicNumber:
        active: false
        excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/*.kts']
        ignoreNumbers:
            - '-1'
            - '0'
            - '1'
            - '2'
        ignoreHashCodeFunction: true
        ignorePropertyDeclaration: true
        ignoreLocalVariableDeclaration: false
        ignoreConstantDeclaration: true
        ignoreCompanionObjectPropertyDeclaration: true
        ignoreAnnotation: false
        ignoreNamedArgument: true
        ignoreEnums: false
        ignoreRanges: false
        ignoreExtensionFunctions: true
    MandatoryBracesLoops:
        active: true
    MaxChainedCallsOnSameLine:
        active: false
        maxChainedCalls: 5
    MaxLineLength:
        active: false
        maxLineLength: 140
        excludePackageStatements: true
        excludeImportStatements: true
        excludeCommentStatements: false
        excludeRawStrings: true
    MayBeConst:
        active: true
    ModifierOrder:
        active: true
    MultilineLambdaItParameter:
        active: false
    MultilineRawStringIndentation:
        active: false
        indentSize: 4
        trimmingMethods:
            - 'trimIndent'
            - 'trimMargin'
    NestedClassesVisibility:
        active: true
    NewLineAtEndOfFile:
        active: false
    NoTabs:
        active: true
    NullableBooleanCheck:
        active: false
    ObjectLiteralToLambda:
        active: true
    OptionalAbstractKeyword:
        active: true
    OptionalUnit:
        active: false
    PreferToOverPairSyntax:
        active: false
    ProtectedMemberInFinalClass:
        active: true
    RedundantExplicitType:
        active: false
    RedundantHigherOrderMapUsage:
        active: true
    RedundantVisibilityModifierRule:
        active: true
    ReturnCount:
        active: false
        max: 2
        excludedFunctions:
            - 'equals'
        excludeLabeled: false
        excludeReturnFromLambda: true
        excludeGuardClauses: false
    SafeCast:
        active: true
    SerialVersionUIDInSerializableClass:
        active: true
    SpacingBetweenPackageAndImports:
        active: true
    StringShouldBeRawString:
        active: false
        maxEscapedCharacterCount: 2
        ignoredCharacters: []
    ThrowsCount:
        active: false
        excludeGuardClauses: false
